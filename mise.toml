[tools]
actionlint = "1.7.12"
gitleaks = "8.30.1"
lefthook = "2.1.9"
node = "24"
pinact = "4.0.0"
pnpm = "11"
zizmor = "1.24.1"

[settings]
install_before = "3d"

[hooks]
postinstall = "lefthook install"

[tasks."actions:zizmor"]
description = "run zizmor security linter on GitHub Actions workflows"
run = "zizmor --min-confidence medium .github/workflows"

[tasks."actions:pinact"]
description = "pin GitHub Actions versions to commit hashes"
run = "pinact run"

[tasks."actions:actionlint"]
description = "lint GitHub Actions workflow syntax with actionlint"
run = "actionlint"

[tasks."actions:lint"]
description = "lint GitHub Actions workflows (actionlint + zizmor)"
depends = ["actions:actionlint", "actions:zizmor"]

[tasks."secrets:scan-tree"]
description = "scan working tree with secretlint (provider-rule based, ~28 services)"
run = "pnpm exec secretlint --secretlintignore .secretlintignore '**/*'"

[tasks."secrets:scan-history"]
description = "scan git history with gitleaks (entropy + ~150 rules, used in pre-push and CI)"
run = "gitleaks git --no-banner --redact --verbose"

[tasks."secrets:scan"]
description = "run both secret scanners (secretlint on tree + gitleaks on history)"
depends = ["secrets:scan-tree", "secrets:scan-history"]
